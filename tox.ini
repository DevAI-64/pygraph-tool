# content of: tox.ini
[tox]
envlist = py38,py39,py310,py311,py312
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Linting, checking syntax and running tests
require_locked_deps = true
install_dev_deps = true
commands =
    poetry run black pygraph_tool/edge.py
    poetry run flake8 pygraph_tool/edge.py
    poetry run pylint pygraph_tool/edge.py
    poetry run black pygraph_tool/node.py
    poetry run flake8 pygraph_tool/node.py
    poetry run pylint pygraph_tool/node.py
    poetry run black pygraph_tool/graph.py
    poetry run flake8 pygraph_tool/graph.py
    poetry run pylint pygraph_tool/graph.py
    poetry run coverage run -m pytest -v
    poetry run coverage report